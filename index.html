<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="index.css" />
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia</title>
</head>
<body>

    <audio id="musica-fondo" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<div id="control-musica" class="control-musica content-hidden">
    <button id="btn-musica" title="Pausar/Reproducir">🎵</button>
</div>
    <div id="overlay-bienvenida" class="overlay">
        <div class="overlay-contenido">
            <h1>Nuestra Historia Juntos</h1>
            <img src="paginawebfoto1.png" alt="Anny Marin Londoño" class="foto-perfil">
            <p>Para la persona mas importante de mi vida</p>
            <button id="btn-entrar" class="btn-accion">Entrar ❤️</button>
        </div>
    </div>

    <button class="btn-sorpresa" id="btn-sorpresa">🎁</button>
    <div class="arriba content-hidden" id="main-content">
        <div class="encabezado">
            <p class="nombre-izq">Anny Marin Londoño</p>
            <div class="foto-perfil-wrapper" id="slideshow-juntos" data-folder="juntos">
            </div>
            <p class="nombre-der">Juan Sebastian Cañas Cano</p>
        </div>
        <div class="contador-tiempo">
            <div class="tiempo-unidad">
                <span id="dias">0</span>
                <p>días</p>
            </div>
            <div class="tiempo-unidad">
                <span id="horas">0</span>
                <p>horas</p>
            </div>
            <div class="tiempo-unidad">
                <span id="minutos">0</span>
                <p>min</p>
            </div>
            <div class="tiempo-unidad">
                <span id="segundos">0</span>
                <p>seg</p>
            </div>
        </div>
        
        <div class="album-container">
            <div class="album-columna">
                <h3>Anny</h3>
                <div class="fotos-wrapper" id="album-anny">
                    <img src="" alt="Foto de Anny" class="foto-album">
                </div>
            </div>

            <div class="texto-historia card-glass">
                <h2>Nuestra Historia</h2>
                <p>Constuyendose dia a dia...</p>
            </div>

            <div class="album-columna">
                <h3>Cañas</h3>
                <div class="fotos-wrapper" id="album-canas" data-folder="canas">
                </div>
            </div>
        </div>
    </div>
    <div id="confetti-container"></div>
    <script src="index.js"></script>
</body>
</html>
